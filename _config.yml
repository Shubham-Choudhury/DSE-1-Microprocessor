title: DSE-1-Microprocessor
email: your-email@example.com
description: >- # this means to ignore newlines until "baseurl:"
  This course provides a comprehensive introduction to microprocessor architecture, programming, and interfacing concepts, with emphasis on Intel 8086/8088 family microprocessors. Students will study the internal architecture, system bus organization, memory hierarchy, input/output interfaces, instruction sets, register organization, and assembly language programming. The course also covers memory address decoding, cache memory, interrupt handling, DMA, timers, communication interfaces, and peripheral devices such as keyboards, displays, and video controllers.

  The laboratory component offers hands-on experience in assembly language programming and microprocessor-based problem solving. Students will develop programs for arithmetic operations on 32-bit binary and BCD numbers, implement searching algorithms, perform array operations, and execute data conversion between binary and ASCII formats. The course equips students with the fundamental knowledge and practical skills required for designing, programming, and interfacing microprocessor-based embedded and computing systems.

